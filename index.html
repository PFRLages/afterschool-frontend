<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After School Classes</title>

    <!-- Bootstrap CSS for layout and styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- The Vue application controls everything inside this div -->
    <div id="app">

        <!-- Navigation bar with the site title and cart button -->
        <nav class="navbar navbar-dark bg-dark mb-4">
            <div class="container">
                <span class="navbar-brand mb-0 h1">
                    <i class="fa-solid fa-graduation-cap"></i> After School Classes
                </span>
                <!-- Cart button: will be enabled in the next phase -->
                <button class="btn btn-outline-light" disabled>
                    <i class="fa-solid fa-cart-shopping"></i> Cart (0)
                </button>
            </div>
        </nav>

        <div class="container">

            <!-- Sorting controls -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <label class="form-label fw-bold">Sort by</label>
                    <select class="form-select" v-model="sortBy">
                        <option value="topic">Subject</option>
                        <option value="location">Location</option>
                        <option value="price">Price</option>
                        <option value="space">Spaces</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Order</label>
                    <select class="form-select" v-model="sortOrder">
                        <option value="asc">Ascending</option>
                        <option value="desc">Descending</option>
                    </select>
                </div>
            </div>

            <!-- Lessons grid: one Bootstrap card per lesson -->
            <div class="row">
                <div class="col-sm-6 col-md-4 col-lg-3 mb-4" v-for="lesson in sortedLessons" :key="lesson._id">
                    <div class="card h-100 shadow-sm">
                        <!-- Lesson image served by the Express static middleware -->
                        <img :src="apiUrl + '/' + lesson.image" class="card-img-top p-3" :alt="lesson.topic" style="height: 160px; object-fit: contain;">
                        <div class="card-body">
                            <h5 class="card-title">{{ lesson.topic }}</h5>
                            <p class="card-text mb-1">
                                <i class="fa-solid fa-location-dot"></i> {{ lesson.location }}
                            </p>
                            <p class="card-text mb-1">
                                <i class="fa-solid fa-tag"></i> £{{ lesson.price }}
                            </p>
                            <p class="card-text">
                                <i class="fa-solid fa-users"></i> {{ lesson.space }} spaces left
                            </p>
                        </div>
                        <div class="card-footer bg-white border-0 pb-3">
                            <!-- Add to cart: wired up in the next phase -->
                            <button class="btn btn-primary w-100" disabled>
                                Add to Cart
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Vue.js library -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.min.js"></script>
    <!-- Our application logic -->
    <script src="script.js"></script>
</body>
</html>
